name: CI

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            gradle-${{ runner.os }}-

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build
        run: ./gradlew build --no-daemon --stacktrace

      - name: Run tests
        run: ./gradlew test --no-daemon --stacktrace
        continue-on-error: true

      - name: Run ktlint
        run: ./gradlew ktlintCheck --no-daemon
        continue-on-error: true

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: library/build/
          retention-days: 7

      - name: Generate Kover coverage report
        run: ./gradlew koverXmlReport --no-daemon --stacktrace

      - name: Verify coverage thresholds
        run: ./gradlew koverVerify --no-daemon --stacktrace
        continue-on-error: true

      - name: Parse Kover coverage data
        id: coverage
        run: |
          REPORT_PATH="./library/build/reports/kover/report.xml"

          if [ -f "$REPORT_PATH" ]; then
            MISSED=$(grep -o 'type="LINE" missed="[^"]*"' "$REPORT_PATH" | tail -1 | sed 's/.*missed="\([^"]*\)".*/\1/' || echo "0")
            COVERED=$(grep -o 'type="LINE"[^/]* covered="[^"]*"' "$REPORT_PATH" | tail -1 | sed 's/.*covered="\([^"]*\)".*/\1/' || echo "0")

            TOTAL=$((MISSED + COVERED))
            if [ "$TOTAL" -gt 0 ]; then
              LINE_PERCENTAGE=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc -l 2>/dev/null || echo "0")
            else
              LINE_PERCENTAGE="0"
            fi

            echo "line_coverage=$LINE_PERCENTAGE" >> $GITHUB_OUTPUT
            echo "covered_lines=$COVERED"         >> $GITHUB_OUTPUT
            echo "total_lines=$TOTAL"             >> $GITHUB_OUTPUT
            echo "has_coverage=true"              >> $GITHUB_OUTPUT
            echo "Kover line coverage: $LINE_PERCENTAGE% ($COVERED/$TOTAL)"
          else
            echo "Kover report not found at $REPORT_PATH"
            echo "line_coverage=0"    >> $GITHUB_OUTPUT
            echo "covered_lines=0"    >> $GITHUB_OUTPUT
            echo "total_lines=0"      >> $GITHUB_OUTPUT
            echo "has_coverage=false" >> $GITHUB_OUTPUT
          fi

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: library/build/reports/kover/
          retention-days: 30

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: ismoy/ImagePickerKMP
          files: ./library/build/reports/kover/report.xml
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: true
          verbose: true

      - name: Comment PR with coverage summary
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            try {
              const xmlPath = './library/build/reports/kover/report.xml';
              if (!fs.existsSync(xmlPath)) return;
              const xml = fs.readFileSync(xmlPath, 'utf8');
              const matches = xml.match(/type="LINE" missed="(\d+)" covered="(\d+)"/g);
              if (!matches) return;
              const last = matches[matches.length - 1].match(/missed="(\d+)" covered="(\d+)"/);
              const missed = parseInt(last[1]), covered = parseInt(last[2]);
              const total = missed + covered;
              const pct = total > 0 ? ((covered / total) * 100).toFixed(1) : '0.0';
              await github.rest.issues.createComment({
                issue_number: context.issue.number,
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: `## 📊 Coverage Report\n\n**Line Coverage:** ${pct}% (${covered} of ${total} lines)\n\n[View on Codecov](https://codecov.io/gh/ismoy/ImagePickerKMP)\n\n---\n*Generated automatically by CI*`
              });
            } catch (e) { console.log('Could not post coverage comment:', e.message); }

      - name: Notify Discord on Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          COVERAGE_TEXT="not available"
          if [ "${{ steps.coverage.outputs.has_coverage }}" == "true" ]; then
            COVERAGE_TEXT="${{ steps.coverage.outputs.line_coverage }}% (${{ steps.coverage.outputs.covered_lines }}/${{ steps.coverage.outputs.total_lines }} lines)"
          fi
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"✅ **CI Build Success** — ImagePickerKMP\n**Branch:** \`${{ github.ref_name }}\`\n**Author:** ${{ github.actor }}\n**Coverage:** ${COVERAGE_TEXT}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Notify Discord on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ **CI Build Failed** — ImagePickerKMP\n**Branch:** \`${{ github.ref_name }}\`\n**Author:** ${{ github.actor }}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
