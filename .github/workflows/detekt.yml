name: Detekt

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  detekt:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 17

      - name: Run Detekt
        id: detekt_run
        run: ./gradlew detekt --no-daemon --stacktrace

      - name: Count Detekt issues
        id: detekt_issues
        shell: bash
        run: |
          DETEKT_REPORT=library/build/reports/detekt/detekt.xml
          ISSUES=0
          if [ -f "$DETEKT_REPORT" ]; then
            COUNT=$(grep -c '<error ' "$DETEKT_REPORT" 2>/dev/null || true)
            [[ "$COUNT" =~ ^[0-9]+$ ]] && ISSUES=$COUNT
          fi
          echo "issues=${ISSUES}" >> "$GITHUB_OUTPUT"

      - name: Notify Discord on Success
        if: success()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"✅ **Detekt Passed** — ImagePickerKMP\n**Branch:** \`${{ github.ref_name }}\`\n**Author:** ${{ github.actor }}\n**Issues found:** ${{ steps.detekt_issues.outputs.issues }}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"

      - name: Notify Discord on Failure
        if: failure()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"❌ **Detekt Failed** — ImagePickerKMP\n**Branch:** \`${{ github.ref_name }}\`\n**Author:** ${{ github.actor }}\n**Issues found:** ${{ steps.detekt_issues.outputs.issues }}\n🔗 ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}"
