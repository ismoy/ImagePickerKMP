name: Notifications

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed

jobs:
  notify:
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download coverage artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-report
          path: ./coverage
          github-token: ${{ secrets.GITHUB_TOKEN }}
          run-id: ${{ github.event.workflow_run.id }}
        continue-on-error: true

      - name: Parse Kover coverage data
        id: coverage
        run: |
          REPORT_PATH="./coverage/report.xml"

          if [ -f "$REPORT_PATH" ]; then
            MISSED=$(grep -o 'type="LINE" missed="[^"]*"' "$REPORT_PATH" | tail -1 | sed 's/.*missed="\([^"]*\)".*/\1/' || echo "0")
            COVERED=$(grep -o 'type="LINE"[^/]* covered="[^"]*"' "$REPORT_PATH" | tail -1 | sed 's/.*covered="\([^"]*\)".*/\1/' || echo "0")
            TOTAL=$((MISSED + COVERED))
            if [ "$TOTAL" -gt 0 ]; then
              LINE_PERCENTAGE=$(echo "scale=1; $COVERED * 100 / $TOTAL" | bc -l 2>/dev/null || echo "0")
            else
              LINE_PERCENTAGE="0"
            fi
            echo "line_coverage=$LINE_PERCENTAGE" >> $GITHUB_OUTPUT
            echo "has_coverage=true"              >> $GITHUB_OUTPUT
          else
            echo "line_coverage=0"    >> $GITHUB_OUTPUT
            echo "has_coverage=false" >> $GITHUB_OUTPUT
          fi

      - name: Notify Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
        run: |
          CONCLUSION="${{ github.event.workflow_run.conclusion }}"
          BRANCH="${{ github.event.workflow_run.head_branch }}"
          ACTOR="${{ github.event.workflow_run.actor.login }}"
          URL="${{ github.event.workflow_run.html_url }}"

          if [ "$CONCLUSION" == "success" ]; then
            ICON="✅"
            STATUS="Success"
          else
            ICON="❌"
            STATUS="Failed"
          fi

          COVERAGE_TEXT="not available"
          if [ "${{ steps.coverage.outputs.has_coverage }}" == "true" ]; then
            COVERAGE_TEXT="${{ steps.coverage.outputs.line_coverage }}%"
          fi

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "{\"content\":\"${ICON} **CI ${STATUS}** — ImagePickerKMP\n**Branch:** \`${BRANCH}\`\n**Author:** ${ACTOR}\n**Coverage:** ${COVERAGE_TEXT}\n🔗 ${URL}\"}"
