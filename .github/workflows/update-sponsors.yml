name: Update Sponsors List

on:
  schedule:
    - cron: '0 0 * * 1'   # Every Monday at midnight UTC
  workflow_dispatch:        # Allow manual trigger

jobs:
  update-sponsors:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Fetch sponsors from Firebase Realtime Database
        run: |
          curl -s \
            "https://belzspeedscan-default-rtdb.firebaseio.com/ImagePickerKMPSponsor.json" \
            -o /tmp/sponsors.json
          echo "Fetched $(wc -c < /tmp/sponsors.json) bytes"
          cat /tmp/sponsors.json

      - name: Update README sponsors section
        run: |
          SPONSORS_JSON="$(cat /tmp/sponsors.json)" \
            README_PATH="README.md" \
            python3 .github/scripts/update_sponsors.py

      - name: Commit changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git diff --quiet README.md || (
            git add README.md &&
            git commit -m "chore: update sponsors list [skip ci]" &&
            git push
          )
          echo "Done."
